<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Run Details</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.1/dist/tailwind.min.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

    <style>
      body {
        background: #0b1220;
        color: #e5e7eb;
      }
      .card {
        background: rgba(17, 24, 39, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
      }
    </style>
  </head>
  <body>
    <div class="max-w-6xl mx-auto p-6">
      <div class="flex items-center justify-between gap-4">
        <div>
          <h1 class="text-2xl font-semibold">Run</h1>
          <p class="text-sm text-slate-300 mt-1">
            <span class="font-mono">{{ run_id }}</span>
          </p>
        </div>
        <a class="text-indigo-300 hover:text-indigo-200 underline" href="/">Back</a>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 mt-6">
        <div class="card p-4 lg:col-span-2">
          <div class="flex items-center justify-between">
            <h2 class="font-medium text-lg">Distance distribution</h2>
            <div id="kpiLine" class="text-sm text-slate-300"></div>
          </div>
          <div class="mt-3">
            <canvas id="histChart" height="130"></canvas>
          </div>
        </div>
        <div class="card p-4">
          <h2 class="font-medium text-lg">Map (nearest)</h2>
          <div id="map" class="mt-3 h-64 rounded border border-slate-800"></div>
        </div>
      </div>

      <div class="card p-4 mt-4">
        <div class="flex items-center justify-between gap-3">
          <h2 class="font-medium text-lg">Findings</h2>
          <div class="text-sm text-slate-300">
            Showing first <span id="limitShown">50</span>
          </div>
        </div>
        <div class="mt-3 overflow-auto">
          <table class="w-full text-sm">
            <thead class="text-slate-400">
              <tr class="text-left">
                <th class="py-2 pr-2">#</th>
                <th class="py-2 pr-2">Distance</th>
                <th class="py-2 pr-2">Name</th>
                <th class="py-2 pr-2">Type</th>
                <th class="py-2 pr-2">Phone</th>
                <th class="py-2">Website</th>
              </tr>
            </thead>
            <tbody id="findingsTbody" class="divide-y divide-slate-800"></tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      const runId = "{{ run_id }}";

      function addOrUpdateMarker(map, markers, item) {
        const { latitude, longitude, name } = item;
        if (!latitude || !longitude) return;
        const key = `${latitude.toFixed(6)}_${longitude.toFixed(6)}`;
        if (markers[key]) return;
        const marker = L.marker([latitude, longitude]).bindPopup(name);
        marker.addTo(map);
        markers[key] = marker;
      }

      function renderHistogram(findings) {
        const ctx = document.getElementById("histChart").getContext("2d");
        const distances = findings
          .map((f) => f.distance_miles)
          .filter((d) => typeof d === "number" && !Number.isNaN(d));

        const bins = 24;
        const max = distances.length ? Math.max(...distances) : 1;
        const step = max / bins || 1;

        const counts = new Array(bins).fill(0);
        for (const d of distances) {
          const idx = Math.min(bins - 1, Math.floor(d / step));
          counts[idx] += 1;
        }

        const labels = counts.map((_, i) => {
          const a = (i * step).toFixed(1);
          const b = ((i + 1) * step).toFixed(1);
          return `${a}-${b}`;
        });

        new Chart(ctx, {
          type: "bar",
          data: {
            labels,
            datasets: [
              {
                label: "Businesses",
                data: counts,
                backgroundColor: "rgba(99, 102, 241, 0.7)",
                borderWidth: 0,
              },
            ],
          },
          options: {
            plugins: {
              legend: { display: false },
            },
            scales: {
              x: { ticks: { color: "#cbd5e1", maxRotation: 0 } },
              y: { ticks: { color: "#cbd5e1" } },
            },
          },
        });
      }

      function renderTable(findings, limit) {
        const tbody = document.getElementById("findingsTbody");
        tbody.innerHTML = "";
        const rows = findings.slice(0, limit);
        for (let i = 0; i < rows.length; i++) {
          const f = rows[i];
          const website = f.website && f.website !== "N/A" ? f.website : null;
          const websiteCell = website
            ? `<a class="text-indigo-300 hover:text-indigo-200 underline" target="_blank" href="${website}">${website.replace(/^https?:\\/\\//, "")}</a>`
            : "N/A";

          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td class="py-2 pr-2">${i + 1}</td>
            <td class="py-2 pr-2">${Number(f.distance_miles).toFixed(2)}</td>
            <td class="py-2 pr-2">${f.name}</td>
            <td class="py-2 pr-2">${f.business_type}</td>
            <td class="py-2 pr-2">${f.phone}</td>
            <td class="py-2">${websiteCell}</td>
          `;
          tbody.appendChild(tr);
        }
      }

      async function loadRun() {
        const detailsRes = await fetch(`/api/runs/${runId}`);
        if (!detailsRes.ok) throw new Error("Failed loading run");
        const details = await detailsRes.json();

        const findingsRes = await fetch(`/api/runs/${runId}/findings`);
        if (!findingsRes.ok) throw new Error("Failed loading findings");
        const findings = await findingsRes.json();

        document.getElementById(
          "kpiLine"
        ).textContent = `Status: ${details.status} • ${findings.length} findings`;

        renderHistogram(findings);

        const map = L.map("map");
        const markers = {};
        const first = findings.find((f) => f.latitude && f.longitude);
        if (first) map.setView([first.latitude, first.longitude], 13);
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          maxZoom: 19,
          attribution: "© OpenStreetMap",
        }).addTo(map);

        const limit = 200;
        for (const item of findings.slice(0, limit)) {
          addOrUpdateMarker(map, markers, item);
        }

        const shown = 50;
        document.getElementById("limitShown").textContent = shown;
        renderTable(findings, shown);
      }

      loadRun().catch((e) => {
        console.error(e);
        alert("Failed to load run details. Check server logs.");
      });
    </script>
  </body>
</html>
