<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zcrawler Runs</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.1/dist/tailwind.min.css"
    />
    <style>
      body {
        background: #0b1220;
        color: #e5e7eb;
      }
      .card {
        background: rgba(17, 24, 39, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
      }
    </style>
  </head>
  <body>
    <div class="max-w-6xl mx-auto p-6">
      <div class="flex items-start justify-between gap-4">
        <div>
          <h1 class="text-2xl font-semibold">Zcrawler</h1>
          <p class="text-sm text-slate-300 mt-1">
            Create runs, track progress, and view findings.
          </p>
        </div>
        <div class="text-right">
          <div id="statusLine" class="text-sm text-slate-300">Loading…</div>
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-6">
        <div class="card p-4">
          <h2 class="font-medium text-lg">Create new run</h2>
          <form id="createRunForm" class="mt-4 space-y-3">
            <div>
              <label class="text-sm text-slate-300">Reference address</label>
              <input
                id="referenceAddress"
                name="reference_address"
                type="text"
                class="mt-1 w-full bg-slate-900 border border-slate-700 rounded px-3 py-2"
                value="410 Glendale Blvd, Valparaiso, Indiana 46383"
              />
            </div>
            <div>
              <label class="text-sm text-slate-300">City query</label>
              <input
                id="cityQuery"
                name="city_query"
                type="text"
                class="mt-1 w-full bg-slate-900 border border-slate-700 rounded px-3 py-2"
                value="Valparaiso, Indiana, USA"
              />
            </div>
            <div class="flex items-center gap-3">
              <input
                id="enableReverseGeocode"
                type="checkbox"
                checked
                class="h-4 w-4"
              />
              <label class="text-sm text-slate-300">Enable reverse geocode</label>
            </div>
            <div>
              <label class="text-sm text-slate-300">Max reverse lookups</label>
              <input
                id="maxReverseGeocodeLookups"
                type="number"
                min="0"
                max="50"
                class="mt-1 w-full bg-slate-900 border border-slate-700 rounded px-3 py-2"
                value="10"
              />
            </div>

            <button
              type="submit"
              class="w-full py-2 rounded bg-indigo-600 hover:bg-indigo-500 font-medium"
            >
              Run crawler
            </button>
          </form>
        </div>

        <div class="card p-4">
          <h2 class="font-medium text-lg">Recent runs</h2>
          <div class="mt-3 overflow-auto">
            <table class="w-full text-sm">
              <thead class="text-slate-400">
                <tr class="text-left">
                  <th class="py-2 pr-2">Status</th>
                  <th class="py-2 pr-2">Findings</th>
                  <th class="py-2 pr-2">Created</th>
                  <th class="py-2">Action</th>
                </tr>
              </thead>
              <tbody id="runsTbody" class="divide-y divide-slate-800"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script>
      function renderRuns(runs) {
        const tbody = document.getElementById("runsTbody");
        tbody.innerHTML = "";
        for (const run of runs) {
          const tr = document.createElement("tr");
          tr.className = "";

          const statusColor =
            run.status === "completed"
              ? "text-emerald-300"
              : run.status === "failed"
              ? "text-red-300"
              : run.status === "running"
              ? "text-amber-300"
              : "text-slate-300";

          tr.innerHTML = `
            <td class="py-2 pr-2">
              <span class="${statusColor} font-medium">${run.status}</span>
            </td>
            <td class="py-2 pr-2">${run.findings_count ?? 0}</td>
            <td class="py-2 pr-2">${new Date(run.created_at).toLocaleString()}</td>
            <td class="py-2">
              <a class="text-indigo-300 hover:text-indigo-200 underline" href="/runs/${run.id}">View</a>
            </td>
          `;
          tbody.appendChild(tr);
        }
      }

      async function fetchRuns() {
        const res = await fetch("/api/runs");
        if (!res.ok) throw new Error("Failed fetching runs");
        const runs = await res.json();
        renderRuns(runs);
        const last = runs[0];
        document.getElementById("statusLine").textContent = last
          ? `Latest: ${last.status} (${last.findings_count ?? 0} findings)`
          : "No runs yet.";
      }

      document.getElementById("createRunForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const body = {
          reference_address: document.getElementById("referenceAddress").value,
          city_query: document.getElementById("cityQuery").value,
          enable_reverse_geocode: document.getElementById("enableReverseGeocode").checked,
          max_reverse_geocode_lookups: parseInt(document.getElementById("maxReverseGeocodeLookups").value, 10),
        };

        const res = await fetch("/api/runs", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (!res.ok) {
          alert(data?.detail || "Failed to create run");
          return;
        }
        window.location.href = `/runs/${data.id}`;
      });

      fetchRuns();
      setInterval(fetchRuns, 5000);
    </script>
  </body>
</html>
